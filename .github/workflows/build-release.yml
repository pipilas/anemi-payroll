name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Build Windows EXE ────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller reportlab requests flask

      - name: Build EXE
        run: pyinstaller stamhad_payroll.spec --clean --noconfirm

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/StamhadPayroll.exe

  # ── Build macOS DMG ──────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller reportlab requests flask

      - name: Build APP
        run: pyinstaller stamhad_payroll.spec --clean --noconfirm

      - name: Get version
        id: version
        run: echo "version=$(cat version.txt | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Create DMG
        run: |
          APP_NAME="Stamhad Payroll"
          VERSION=${{ steps.version.outputs.version }}
          DMG_NAME="StamhadPayroll-${VERSION}-mac"

          mkdir -p dmg_temp
          cp -R "dist/${APP_NAME}.app" dmg_temp/
          ln -s /Applications dmg_temp/Applications

          hdiutil create -volname "${APP_NAME}" \
            -srcfolder dmg_temp \
            -ov -format UDZO \
            "dist/${DMG_NAME}.dmg"

          rm -rf dmg_temp

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/StamhadPayroll-*-mac.dmg

  # ── Create GitHub Release ────────────────────────────────────────────────
  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=$(cat version.txt | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Download Windows EXE
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: artifacts/

      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: artifacts/

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "v${{ steps.version.outputs.version }}"
          body: |
            ## Stamhad Payroll v${{ steps.version.outputs.version }}

            ### Downloads
            - **Windows:** StamhadPayroll.exe
            - **macOS:** StamhadPayroll-${{ steps.version.outputs.version }}-mac.dmg
          files: |
            artifacts/StamhadPayroll.exe
            artifacts/StamhadPayroll-*-mac.dmg
